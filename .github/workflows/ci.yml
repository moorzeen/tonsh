name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libsecret
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsecret-1-dev

      - name: Test
        run: go test ./...